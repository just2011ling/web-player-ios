name: ios-build

on:
  workflow_dispatch:
    inputs:
      export_method:
        description: Xcode export method for the IPA
        required: true
        type: choice
        default: release-testing
        options:
          - debugging
          - release-testing
          - app-store-connect

permissions:
  contents: read

jobs:
  build-ios:
    runs-on: macos-15
    env:
      CI: true
      HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
      IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}
      EXPORT_METHOD: ${{ github.event.inputs.export_method || 'release-testing' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Detect iOS signing mode
        shell: bash
        run: |
          if [[ -n "$APPLE_API_ISSUER" && -n "$APPLE_API_KEY" && -n "$APPLE_API_KEY_CONTENT" ]]; then
            echo "Using App Store Connect API key signing."
            echo "IOS_SIGNING_MODE=automatic" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ -n "$IOS_CERTIFICATE" && -n "$IOS_CERTIFICATE_PASSWORD" && -n "$IOS_MOBILE_PROVISION" ]]; then
            echo "Using manual certificate signing."
            echo "IOS_SIGNING_MODE=manual" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "No iOS signing secrets detected. Falling back to an unsigned simulator build."
          echo "IOS_SIGNING_MODE=none" >> "$GITHUB_ENV"

      - name: Write App Store Connect key
        if: ${{ env.IOS_SIGNING_MODE == 'automatic' }}
        shell: bash
        run: |
          key_dir="$RUNNER_TEMP/appstore-connect"
          mkdir -p "$key_dir"
          key_path="$key_dir/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Initialize iOS project
        run: npm run tauri ios init -- --ci

      - name: Build signed iOS IPA
        if: ${{ env.IOS_SIGNING_MODE != 'none' }}
        run: npm run tauri ios build -- --ci --target aarch64 --export-method "$EXPORT_METHOD" --build-number "${{ github.run_number }}"

      - name: Build unsigned iOS simulator app
        if: ${{ env.IOS_SIGNING_MODE == 'none' }}
        shell: bash
        run: |
          project_root="src-tauri/gen/apple"
          derived_data_path="$project_root/DerivedData"

          workspace_path=$(find "$project_root" -maxdepth 3 -name "*.xcworkspace" -print -quit)
          project_path=$(find "$project_root" -maxdepth 3 -name "*.xcodeproj" -print -quit)

          if [[ -n "$workspace_path" ]]; then
            container_args=( -workspace "$workspace_path" )
          elif [[ -n "$project_path" ]]; then
            container_args=( -project "$project_path" )
          else
            echo "No Xcode workspace or project found under $project_root"
            exit 1
          fi

          scheme=$(xcodebuild "${container_args[@]}" -list -json | ruby -rjson -e 'data = JSON.parse(STDIN.read); root = data["workspace"] || data["project"] || {}; schemes = root["schemes"] || []; abort("No Xcode scheme found") if schemes.empty?; puts schemes.first')

          xcodebuild \
            "${container_args[@]}" \
            -scheme "$scheme" \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$derived_data_path" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            build

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ env.IOS_SIGNING_MODE }}-${{ env.EXPORT_METHOD }}-${{ github.run_number }}
          if-no-files-found: warn
          path: |
            src-tauri/gen/apple/build/**/*
            src-tauri/gen/apple/DerivedData/Build/Products/**/*